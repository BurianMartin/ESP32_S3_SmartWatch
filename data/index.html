
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twatch Control Panel</title>
    <style>
        :root {
            --bg-color: #0a0a0f;
            --card-bg: #12151f;
            --text-color: #e5e7eb;
            --text-light: #9ca3af;
            --neon-cyan: #0ff;
            --neon-red: #f55;
            --neon-yellow: #ff0;
            --neon-purple: #f0f;
            --neon-green: #0f0;
            --neon-blue: #00f;
            --sidebar-width: 220px;
            --sidebar-collapsed-width: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            background: linear-gradient(45deg, #0a0a1f, #1a1a2f, #0f1a2f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            min-height: 100vh;
            padding-left: var(--sidebar-collapsed-width);
            transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--sidebar-collapsed-width);
            background: rgba(18, 21, 31, 0.95);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            z-index: 1000;
            border-right: 1px solid rgba(0, 255, 255, 0.1);
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .sidebar:hover {
            width: var(--sidebar-width);
            box-shadow: 5px 0 25px rgba(0, 255, 255, 0.2);
        }

        .sidebar-links {
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
            padding: 1rem;
            color: var(--text-color);
            text-decoration: none;
            transition: all 0.3s ease;
            white-space: nowrap;
            border-left: 3px solid transparent;
        }

        .sidebar-link:hover {
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.1) 0%, transparent 100%);
            border-left: 3px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding-left: 1.5rem;
        }

        .main-content {
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .control-card {
            background: rgba(18, 21, 31, 0.8);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .control-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--neon-cyan);
        }

        .color-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .color-button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-weight: bold;
        }

        .color-button.purple { background: var(--neon-purple); }
        .color-button.yellow { background: var(--neon-yellow); color: black; }
        .color-button.red { background: var(--neon-red); }
        .color-button.green { background: var(--neon-green); }
        .color-button.blue { background: var(--neon-blue); }

        .color-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px currentColor;
        }

        .slider-container {
            margin: 1rem 0;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(0, 255, 255, 0.1);
            outline: none;
            transition: all 0.3s ease;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--neon-cyan);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .slider::-webkit-slider-thumb:hover {
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .time-input {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 0.5rem;
            border-radius: 0.5rem;
            color: var(--text-color);
            margin-right: 1rem;
        }

        .submit-button {
            background: var(--neon-cyan);
            color: var(--card-bg);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 768px) {
            body {
                padding-left: 0;
            }

            .sidebar {
                width: 0;
            }

            .sidebar:hover {
                width: var(--sidebar-width);
            }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-links">
            <a href="/wifi" class="sidebar-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
                </svg>
                WiFi
            </a>
            <a href="#" class="sidebar-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
                Timer
            </a>
            <a href="#" class="sidebar-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707"/>
                </svg>
                Settings
            </a>
        </div>
    </nav>

    <main class="main-content">
        <div class="control-card">
            <h2 class="control-title">Set Time</h2>
            <input type="datetime-local" class="time-input" id="timeInput">
            <button class="submit-button" onclick="setTime()">Set Time</button>
        </div>

        <div class="control-card">
            <h2 class="control-title">Color Theme</h2>
            <div class="color-buttons">
                <button class="color-button purple" onclick="setColor('purple')">Purple</button>
                <button class="color-button yellow" onclick="setColor('yellow')">Yellow</button>
                <button class="color-button red" onclick="setColor('red')">Red</button>
                <button class="color-button green" onclick="setColor('green')">Green</button>
                <button class="color-button blue" onclick="setColor('blue')">Blue</button>
            </div>
        </div>

        <div class="control-card">
            <h2 class="control-title">Brightness</h2>
            <div class="slider-container">
                <input type="range" min="0" max="100" value="50" class="slider" id="brightnessSlider">
                <div id="brightnessValue">50%</div>
            </div>
        </div>

        <div class="control-card">
            <h2 class="control-title">Sleep Timeout</h2>
            <div class="slider-container">
                <input type="range" min="5" max="30" value="7" class="slider" id="sleepSlider">
                <div id="sleepValue">7 seconds</div>
            </div>
        </div>
    </main>

    <script> 
            // Update brightness value display
        const brightnessSlider = document.getElementById('brightnessSlider');
        const brightnessValue = document.getElementById('brightnessValue');
        const sleepSlider = document.getElementById('sleepSlider');
        const sleepValue = document.getElementById('sleepValue');

        // Update brightness display and send to server
        brightnessSlider.oninput = function() {
            brightnessValue.textContent = this.value + '%';
        };

        brightnessSlider.onchange = async function() {
            try {
                const response = await fetch('/brightness', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `value=${this.value}`
                });
                if (!response.ok) {
                    throw new Error('Failed to set brightness');
                }
            } catch (error) {
                console.error('Error setting brightness:', error);
            }
        };

        // Update sleep timeout display and send to server
        sleepSlider.oninput = function() {
            sleepValue.textContent = this.value + ' seconds';
        };

        sleepSlider.onchange = async function() {
            try {
                const response = await fetch('/sleep', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `value=${this.value}`
                });
                if (!response.ok) {
                    throw new Error('Failed to set sleep timeout');
                }
            } catch (error) {
                console.error('Error setting sleep timeout:', error);
            }
        };

        // Handle color theme changes
        async function setColor(color) {
            try {
                const response = await fetch('/color', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `value=${color[0].toUpperCase()}` // Sends first letter uppercase (P,Y,R,G,B)
                });
                if (!response.ok) {
                    throw new Error('Failed to set color');
                }
            } catch (error) {
                console.error('Error setting color:', error);
            }
        }

        // Handle time setting
        async function setTime() {
            const timeInput = document.getElementById('timeInput');
            const dateTime = new Date(timeInput.value);
            
            if (isNaN(dateTime.getTime())) {
                alert('Please enter a valid date and time');
                return;
            }

            const params = new URLSearchParams({
                year: dateTime.getFullYear(),
                month: dateTime.getMonth() + 1,  
                day: dateTime.getDate(),
                hour: dateTime.getHours(),
                minute: dateTime.getMinutes(),
                second: dateTime.getSeconds()
            });

            try {
                const response = await fetch('/date', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: params.toString()
                });
                if (!response.ok) {
                    throw new Error('Failed to set time');
                }
            } catch (error) {
                console.error('Error setting time:', error);
            }
        }

        // Initialize display values
        document.addEventListener('DOMContentLoaded', () => {
            brightnessValue.textContent = brightnessSlider.value + '%';
            sleepValue.textContent = sleepSlider.value + ' seconds';
            
            // Set current date and time in the input
            const now = new Date();
            const timeString = now.toISOString().slice(0, 16); // Format: YYYY-MM-DDThh:mm
            document.getElementById('timeInput').value = timeString;
        });
    </script>
</body>
</html>
