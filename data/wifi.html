<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twatch WiFi Management</title>
    <style>
        :root {
            --bg-color: #0a0a0f;
            --card-bg: #12151f;
            --text-color: #e5e7eb;
            --text-light: #9ca3af;
            --neon-cyan: #0ff;
            --neon-red: #f55;
            --neon-yellow: #ff0;
            --neon-purple: #f0f;
            --neon-green: #0f0;
            --neon-blue: #00f;
            --sidebar-width: 220px;
            --sidebar-collapsed-width: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            background: linear-gradient(45deg, #0a0a1f, #1a1a2f, #0f1a2f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            min-height: 100vh;
            padding-left: var(--sidebar-collapsed-width);
            transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: var(--sidebar-collapsed-width);
            background: rgba(18, 21, 31, 0.95);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            z-index: 1000;
            border-right: 1px solid rgba(0, 255, 255, 0.1);
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .sidebar:hover {
            width: var(--sidebar-width);
            box-shadow: 5px 0 25px rgba(0, 255, 255, 0.2);
        }

        .sidebar-links {
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
            padding: 1rem;
            color: var(--text-color);
            text-decoration: none;
            transition: all 0.3s ease;
            white-space: nowrap;
            border-left: 3px solid transparent;
        }

        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.1) 0%, transparent 100%);
            border-left: 3px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding-left: 1.5rem;
        }

        .main-content {
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .control-card {
            background: rgba(18, 21, 31, 0.8);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .control-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulse 2s infinite;
        }

        .status-indicator.disconnected {
            background: var(--neon-red);
            box-shadow: 0 0 8px var(--neon-red);
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .mode-button {
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 255, 255, 0.1);
            color: var(--text-color);
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .mode-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .mode-button:hover::before {
            left: 100%;
        }

        .mode-button.active {
            background: var(--neon-cyan);
            color: var(--card-bg);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .mode-button:hover {
            transform: translateY(-2px);
        }

        .mode-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .ip-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 0.5rem 0;
            border: 1px solid rgba(0, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ip-value {
            font-family: 'Courier New', monospace;
            color: var(--neon-cyan);
        }

        .wifi-list {
            list-style: none;
            margin: 1rem 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .wifi-network {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .wifi-network:hover {
            transform: translateX(5px);
            border-color: var(--neon-cyan);
        }

        .wifi-name {
            font-weight: bold;
            flex: 1;
        }

        .wifi-signal {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-right: 1rem;
        }

        .control-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .control-button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .control-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .control-button:hover::before {
            left: 100%;
        }

        .control-button.primary {
            background: var(--neon-cyan);
            color: var(--card-bg);
        }

        .control-button.danger {
            background: var(--neon-red);
            color: white;
        }

        .control-button.small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            min-width: auto;
        }

        .control-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px currentColor;
        }

        .control-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            align-items: end;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-input {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(0, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-light);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 255, 255, 0.1);
            border-top: 2px solid var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 0.5rem;
        }

        .error-message {
            background: rgba(255, 85, 85, 0.1);
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            display: none;
        }

        .success-message {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            display: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body {
                padding-left: 0;
            }

            .sidebar {
                width: 0;
            }

            .sidebar:hover {
                width: var(--sidebar-width);
            }
            
            .mode-buttons {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .control-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-links">
            <a href="/" class="sidebar-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Dashboard
            </a>
            <a href="/wifi" class="sidebar-link active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
                </svg>
                WiFi
            </a>
        </div>
    </nav>

    <main class="main-content">
        <div class="control-card">
            <h2 class="control-title">
                <span class="status-indicator" id="connection-status"></span>
                WiFi Mode
            </h2>
            <div class="mode-buttons">
                <button class="mode-button" onclick="setWifiMode('STA')" id="sta-btn">
                    Station Mode
                </button>
                <button class="mode-button" onclick="setWifiMode('AP')" id="ap-btn">
                    Access Point
                </button>
                <button class="mode-button" onclick="setWifiMode('NULL')" id="off-btn">
                    WiFi Off
                </button>
            </div>
            </div>
        </div>

        <div class="control-card">
            <h2 class="control-title">Network Management</h2>
            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>
            
            <div class="form-group">
                <div class="form-row">
                    <div class="form-group">
                        <input type="text" id="network-name" class="form-input" placeholder="Network SSID" />
                        <input type="password" id="network-password" class="form-input" placeholder="Password" />
                    </div>
                    <div class="form-group">
                        <button class="control-button primary" onclick="addPreferredNetwork()">
                            Add Network
                        </button>
                    </div>
                </div>
                <div class="control-buttons">
                    <button class="control-button primary" onclick="setApCredentials()">Set as AP Credentials</button>
                </div>
            </div>
        </div>

        <div class="control-card">
            <h2 class="control-title">Saved Networks</h2>
            <ul class="wifi-list" id="preferred-list">
                <li style="text-align: center; color: var(--text-light); padding: 2rem;">
                    Loading networks...
                </li>
            </ul>
        </div>

        <div class="control-card">
            <h2 class="control-title">System Controls</h2>
            <div class="control-buttons">
                <button class="control-button danger" onclick="stopServer()">
                    Stop Server
                </button>
            </div>
        </div>
    </main>

    <script>
        let currentMode = 'NULL';
        let isLoading = false;
        
        function showMessage(message, isError = false) {
            const errorEl = document.getElementById('error-message');
            const successEl = document.getElementById('success-message');
            
            if (isError) {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
            } else {
                successEl.textContent = message;
                successEl.style.display = 'block';
                errorEl.style.display = 'none';
            }
            
            setTimeout(() => {
                errorEl.style.display = 'none';
                successEl.style.display = 'none';
            }, 3000);
        }
        
        function setLoading(loading) {
            isLoading = loading;
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = loading);
        }
        
        async function setWifiMode(mode) {
            if (isLoading) return;
            
            setLoading(true);
            try {
                const response = await fetch('/wifi/mode', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `mode=${mode}`
                });
                
                if (!response.ok) throw new Error('Failed to set WiFi mode');
                
                currentMode = mode;
                updateModeButtons();
                await fetchIPAddresses();
            } catch (error) {
                console.error('Error setting WiFi mode:', error);
            } finally {
                setLoading(false);
            }
        }

        async function fetchIPAddresses() {
            try {
                const response = await fetch('/wifi/status');
                const data = await response.json();
                
                // Update IP displays if they exist
                const staIpEl = document.getElementById('sta-ip');
                const apIpEl = document.getElementById('ap-ip');
                
                if (staIpEl) staIpEl.textContent = data.sta_ip || 'Not Connected';
                if (apIpEl) apIpEl.textContent = data.ap_ip || 'Not Active';
                
                const statusIndicator = document.getElementById('connection-status');
                if (data.sta_ip || data.ap_ip) {
                    statusIndicator.classList.remove('disconnected');
                } else {
                    statusIndicator.classList.add('disconnected');
                }
            } catch (error) {
                console.error('Error fetching IP addresses:', error);
            }
        }

        function updateModeButtons() {
            document.querySelectorAll('.mode-button').forEach(button => {
                button.classList.remove('active');
            });
            
            const activeButton = document.getElementById(
                currentMode === 'STA' ? 'sta-btn' : 
                currentMode === 'AP' ? 'ap-btn' : 'off-btn'
            );
            if (activeButton) {
                activeButton.classList.add('active');
            }
        }

        async function fetchPreferredNetworks() {
            try {
                const response = await fetch('/wifi/preferred/list');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const networks = await response.json();
                const preferredList = document.getElementById('preferred-list');
                preferredList.innerHTML = '';

                if (networks.length === 0) {
                    preferredList.innerHTML = '<li style="text-align: center; color: var(--text-light); padding: 2rem;">No saved networks</li>';
                    return;
                }

                networks.forEach(network => {
                    const li = document.createElement('li');
                    li.className = 'wifi-network';
                    li.innerHTML = `
                        <span class="wifi-name">${network.ssid}</span>
                        <span class="wifi-signal">Saved</span>
                        <button class="control-button danger small" onclick="removePreferredNetworkBySSID('${network.ssid}')">
                            Remove
                        </button>
                    `;
                    preferredList.appendChild(li);
                });

            } catch (error) {
                console.error('Error fetching preferred networks:', error);
                showMessage('Failed to load saved networks', true);
            }
        }

        async function addPreferredNetwork() {
            const networkName = document.getElementById('network-name').value.trim();
            const networkPassword = document.getElementById('network-password').value;

            if (!networkName || !networkPassword) {
                showMessage('Please enter both SSID and password', true);
                return;
            }

            if (isLoading) return;
            setLoading(true);

            try {
                const formData = new URLSearchParams();
                formData.append('ssid', networkName);
                formData.append('password', networkPassword);

                const response = await fetch('/wifi/preferred/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString(),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage('Network added successfully!');
                document.getElementById('network-name').value = '';
                document.getElementById('network-password').value = '';
                
                // Force refresh the list
                await fetchPreferredNetworks();
                
            } catch (error) {
                console.error('Error adding network:', error);
            } finally {
                setLoading(false);
            }
        }

        async function setApCredentials() {
            const networkName = document.getElementById('network-name').value.trim();
            const networkPassword = document.getElementById('network-password').value;

            if (!networkName || !networkPassword) {
                showMessage('Please enter both SSID and password', true);
                return;
            }

            if (isLoading) return;
            setLoading(true);

            try {
                const formData = new URLSearchParams();
                formData.append('ssid', networkName);
                formData.append('password', networkPassword);

                const response = await fetch('/wifi/ap/set_credentials', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString(),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage('AP credentials set successfully!');
                document.getElementById('network-name').value = '';
                document.getElementById('network-password').value = '';
                
            } catch (error) {
                console.error('Error setting AP credentials:', error);
            } finally {
                setLoading(false);
            }
        }

        async function removePreferredNetworkBySSID(ssid) {
            if (!ssid || isLoading) return;

            setLoading(true);
            try {
                const formData = new URLSearchParams();
                formData.append('ssid', ssid);

                const response = await fetch('/wifi/preferred/remove', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString(),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                showMessage(`Removed "${ssid}" from saved networks`);
                
                // Force refresh the list
                await fetchPreferredNetworks();
                
            } catch (error) {
                console.error('Error removing network:', error);
            } finally {
                setLoading(false);
            }
        }

        async function stopServer() {
            if (!confirm('Are you sure you want to stop the server?')) return;
            
            try {
                await fetch('/stop', { method: 'POST' });
            } catch (error) {
                console.error('Error stopping server:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchIPAddresses();
            await fetchPreferredNetworks();
            updateModeButtons();
        });
    </script>
</body>
</html>
